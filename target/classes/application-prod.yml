spring:
  application:
    name: facv-loader-service
  datasource:
    # Production Oracle connection
    url: jdbc:oracle:thin:@//HOST:1521/SERVICE_NAME
    username: YOUR_DB_USER
    password: YOUR_DB_PASSWORD
    driver-class-name: oracle.jdbc.OracleDriver
  sql:
    init:
      mode: never

loader:
  enabled: true
  run-on-startup: false
  # Production directories
  incoming-path: /hub/var/incoming
  success-path: /hub/var/success
  failed-path: /hub/var/failed
  file-names:
    - CLFACV.txt
    - CLFACVHASE.txt
  charset: UTF-8
  batch-size: 1000
  # End-of-day scheduler
  schedule-cron: "0 59 23 * * *"
  schedule-zone: Asia/Hong_Kong

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.loader.facv: INFO
    org.springframework.web: INFO
    org.springframework.jdbc.core.JdbcTemplate: WARN

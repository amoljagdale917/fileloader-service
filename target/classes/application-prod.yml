spring:
  application:
    name: facv-loader-service
  datasource:
    # H2 file-based DB for PROD-like setup
    url: jdbc:h2:file:/hub/var/h2/facvdb;MODE=Oracle;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always

loader:
  enabled: true
  run-on-startup: false
  # Production directories
  incoming-path: /hub/var/incoming
  success-path: /hub/var/success
  failed-path: /hub/var/failed
  file-names:
    - CLFACV.txt
    - CLFACVHASE.txt
  charset: UTF-8
  batch-size: 1000
  # End-of-day scheduler
  schedule-cron: "0 59 23 * * *"
  schedule-zone: Asia/Hong_Kong

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.loader.facv: INFO
    org.springframework.web: INFO
    org.springframework.jdbc.core.JdbcTemplate: WARN

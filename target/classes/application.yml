spring:
  application:
    name: facv-loader-service
  profiles:
    active: dev

loader:
  enabled: true
  run-on-startup: false
  # Configure via env vars:
  # LOADER_BASE_PATH=/hub/var (or /Users/<user>/Documents/hub/var for local)
  # Optional overrides: LOADER_INCOMING_PATH, LOADER_SUCCESS_PATH, LOADER_FAILED_PATH
  incoming-path: ${LOADER_INCOMING_PATH:${LOADER_BASE_PATH:hub/var}/incoming}
  success-path: ${LOADER_SUCCESS_PATH:${LOADER_BASE_PATH:hub/var}/success}
  failed-path: ${LOADER_FAILED_PATH:${LOADER_BASE_PATH:hub/var}/failed}
  file-names:
    - CLFACV.txt
    - CLFACVHASE.txt
  charset: UTF-8
  batch-size: 1000
  schedule-cron: "0 59 23 * * *"
  # Every 5 minutes (local testing)
  #schedule-cron: "0 */5 * * * *"
  schedule-zone: Asia/Hong_Kong

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.loader.facv: INFO
    org.springframework.web: INFO
    org.springframework.jdbc.core.JdbcTemplate: WARN

spring:
  application:
    name: facv-loader-service
  profiles:
    active: dev

loader:
  enabled: true
  run-on-startup: false
  input-directory: /opt/loader/input
  file-names:
    - CLFACV.txt
    - CLFACVHASE.txt
  charset: UTF-8
  batch-size: 1000
  # End-of-day daily schedule (23:59)
  schedule-cron: "0 59 23 * * *"
  schedule-zone: Asia/Hong_Kong

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.loader.facv: INFO
    org.springframework.web: INFO
    org.springframework.jdbc.core.JdbcTemplate: WARN

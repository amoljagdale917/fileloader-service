spring:
  datasource:
    url: jdbc:h2:mem:facvdb;DB_CLOSE_DELAY=-1;MODE=Oracle
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true

loader:
  # Local machine default (no export needed)
  incoming-path: ${user.home}/Documents/hub/var/incoming
  success-path: ${user.home}/Documents/hub/var/success
  failed-path: ${user.home}/Documents/hub/var/failed
  # Every 5 minutes for testing
  schedule-cron: "0 */5 * * * *"

logging:
  level:
    root: INFO
    com.loader.facv: DEBUG
    org.springframework.web: DEBUG
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
